.cb.off{opacity:.28}
.cdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cname{font-size:12px;font-weight:600;color:#e0f0ff}
.ccnt{font-size:10px;color:rgba(160,200,255,.4);margin-top:1px}
.ctog{margin-left:auto;width:26px;height:15px;border-radius:8px;background:rgba(255,255,255,.08);position:relative;transition:background .2s}
.cb:not(.off) .ctog{background:rgba(80,180,255,.35)}
.ctog::after{content:'';position:absolute;top:2.5px;left:2.5px;width:10px;height:10px;border-radius:50%;background:rgba(160,200,255,.4);transition:transform .2s,background .2s}

#sat-card{position:absolute;top:72px;left:20px;z-index:10;width:272px;background:rgba(2,6,18,.94);border:.5px solid rgba(100,180,255,.18);border-top:2px solid #60a8ff;border-radius:0 0 14px 14px;padding:14px 16px;backdrop-filter:blur(20px);display:none;animation:sIn .3s ease}

.stype{font-size:10px;color:rgba(160,200,255,.4);margin-top:3px;letter-spacing:.05em}
.cls{font-size:15px;color:rgba(160,200,255,.3);cursor:pointer;padding:0 3px;transition:color .2s}
.cls:hover{color:rgba(160,200,255,.8)}
.sdiv{height:.5px;background:rgba(100,160,255,.1);margin-bottom:10px}
.sstats{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.si{background:rgba(80,140,255,.05);border:.5px solid rgba(100,160,255,.1);border-radius:7px;padding:7px 10px}
.sl{font-size:10px;color:rgba(160,200,255,.38);letter-spacing:.04em;margin-bottom:3px}
.sv{font-size:15px;font-weight:700;color:#90d0ff;font-family:'Courier New',monospace}
.su{font-size:10px;color:rgba(160,200,255,.32);margin-left:2px;font-weight:400}
.spos{font-size:11px;color:rgba(160,200,255,.48);font-family:'Courier New',monospace;line-height:1.9}
.scov{margin-top:8px;display:flex;align-items:center;gap:8px}
.covlbl{font-size:10px;color:rgba(160,200,255,.38);white-space:nowrap}
.covbar{flex:1;height:3px;background:rgba(100,160,255,.1);border-radius:2px;overflow:hidden}
.covfill{height:100%;border-radius:2px;background:linear-gradient(90deg,#1060ff,#60d0ff);transition:width .5s}
#statsbar{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);z-index:10;display:flex;align-items:center;background:rgba(2,8,22,.88);border:.5px solid rgba(100,160,255,.14);border-radius:30px;overflow:hidden;backdrop-filter:blur(14px)}

.sseg:last-child{border-right:none}
.sdot{width:7px;height:7px;border-radius:50%}
.snum{font-weight:700;color:#c0e0ff;font-variant-numeric:tabular-nums;margin-left:2px}
#mbtn{position:absolute;bottom:22px;right:22px;z-index:10;width:52px;height:52px;border-radius:50%;background:rgba(2,8,22,.88);border:.5px solid rgba(180,120,255,.3);color:#c090ff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;backdrop-filter:blur(14px)}

#loading{position:absolute;inset:0;z-index:100;background:#020408;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity 1s ease}
#loading.gone{opacity:0;pointer-events:none}
.lion{font-size:44px;animation:lsp 10s linear infinite}

.ltitle{font-size:34px;font-weight:700;color:#c0e0ff;letter-spacing:.15em}
.lsub{font-size:11px;color:rgba(160,200,255,.28);letter-spacing:.25em}

#hint{position:absolute;bottom:75px;left:22px;z-index:9;font-size:11px;color:rgba(160,200,255,.28);line-height:2.3;pointer-events:none}

    {name:'STARLINK-3003',l1:'1 47690U 21020C   24095.50000000  .00004234  00000-0  38234-3 0  9003',l2:'2 47690  53.0332 325.0123 0004234 190.0123  10.9012 15.05237456789012'},
    {name:'STARLINK-3004',l1:'1 47691U 21020D   24095.50000000  .00004345  00000-0  39234-3 0  9004',l2:'2 47691  53.0343  25.1234 0004345 280.1234  90.0123 15.05237567890123'},
  ],
};

const allSats={},vis={starlink:true,gps:true,beidou:true,iss:true};
let tracked=null,meteorOn=false,meteors=[];

const viewer=new Cesium.Viewer('cesiumContainer',{
  terrain:Cesium.Terrain.fromWorldTerrain({requestVertexNormals:true}),
  animation:false,baseLayerPicker:false,fullscreenButton:false,vrButton:false,
  geocoder:false,homeButton:false,infoBox:false,sceneModePicker:false,
  selectionIndicator:false,timeline:false,navigationHelpButton:false,shouldAnimate:true,
});
viewer.scene.globe.enableLighting=true;
viewer.scene.skyAtmosphere.show=true;
viewer.scene.highDynamicRange=false;
viewer.scene.globe.depthTestAgainstTerrain=false;
Cesium.IonImageryProvider.fromAssetId(3812).then(p=>{const l=viewer.imageryLayers.addImageryProvider(p);l.dayAlpha=0;l.nightAlpha=0.88;l.brightness=2.2;}).catch(()=>{});
viewer.camera.setView({destination:Cesium.Cartesian3.fromDegrees(110,25,22000000),orientation:{heading:0,pitch:Cesium.Math.toRadians(-90),roll:0}});
setInterval(()=>{const d=new Date(),p=n=>String(n).padStart(2,'0');document.getElementById('utc-clock').textContent='UTC '+p(d.getUTCHours())+':'+p(d.getUTCMinutes())+':'+p(d.getUTCSeconds());},1000);

function setStatus(txt,pct){document.getElementById('lstatus').textContent=txt;if(pct!=null)document.getElementById('lfill').style.width=pct+'%';}

function parseTxt(text,max){
  const lines=text.trim().split('\n').map(l=>l.trim()).filter(Boolean),out=[];
  for(let i=0;i+2<lines.length&&out.length<max;i+=3){
    const n=lines[i].replace(/^0 /,'').trim(),l1=lines[i+1],l2=lines[i+2];
    if(l1&&l1.startsWith('1 ')&&l2&&l2.startsWith('2 ')) out.push({name:n,l1,l2});
  }
  return out;
}

async function loadTLE(key){
  const cfg=CFG[key];
  for(const url of cfg.urls){
    try{
      const res=await fetch(url);
      if(!res.ok) continue;
      const txt=await res.text();
      let items=[];
      // 尝试 JSON 格式
      try{
        const json=JSON.parse(txt);
        if(Array.isArray(json)&&json.length>0){
          items=json.slice(0,cfg.max).map(d=>({
            name:d.OBJECT_NAME||d.name||'SAT',
            l1:d.TLE_LINE1||d.line1||'',
            l2:d.TLE_LINE2||d.line2||'',
          })).filter(d=>d.l1&&d.l2);
        }
      } catch(e){
        // TXT 格式
        items=parseTxt(txt,cfg.max);
      }
      if(items.length>0){console.log('OK '+key+' '+items.length+' from '+url);return items;}
    }catch(e){console.warn(key+' '+url+' failed:',e.message);}
  }
  console.warn(key+': using offline backup ('+BACKUP[key].length+' sats)');
  return(BACKUP[key]||[]).map(b=>({name:b.name,l1:b.l1,l2:b.l2}));
}

function getPos(satrec){
  const now=new Date(),pv=satellite.propagate(satrec,now);
  if(!pv||!pv.position||typeof pv.position.x!=='number') return null;
  const gmst=satellite.gstime(now),geo=satellite.eciToGeodetic(pv.position,gmst);
  const lon=satellite.degreesLong(geo.longitude),lat=satellite.degreesLat(geo.latitude),alt=geo.height*1000;
  if(isNaN(lon)||isNaN(lat)||alt<0) return null;
  return{lon,lat,alt,altKm:geo.height,pv};
}

function buildOrbit(satrec,hours){
  const pts=[],now=Date.now(),steps=hours*60*2;
  for(let i=0;i<=steps;i++){
    const t=new Date(now+i*30000),pv=satellite.propagate(satrec,t);
    if(!pv||!pv.position||typeof pv.position.x!=='number') continue;
    const gmst=satellite.gstime(t),geo=satellite.eciToGeodetic(pv.position,gmst);
    const lon=satellite.degreesLong(geo.longitude),lat=satellite.degreesLat(geo.latitude),alt=geo.height*1000;
    if(!isNaN(lon)&&!isNaN(lat)&&alt>0) pts.push(Cesium.Cartesian3.fromDegrees(lon,lat,alt));
  }
  return pts;
}

function buildEntities(key,items){
  const cfg=CFG[key],color=Cesium.Color.fromCssColorString(cfg.color);
  const isISS=key==='iss',isSL=key==='starlink',sats=[];
  items.forEach(item=>{
    let satrec;try{satrec=satellite.twoline2satrec(item.l1,item.l2);}catch(e){return;}
    if(isNaN(satrec.no)) return;
    const r=getPos(satrec);if(!r) return;
    const entity=viewer.entities.add({
      position:Cesium.Cartesian3.fromDegrees(r.lon,r.lat,r.alt),
      point:{pixelSize:isISS?16:isSL?4:8,color:color.withAlpha(isISS?1:.92),outlineColor:color.withAlpha(.3),outlineWidth:isISS?2.5:0,disableDepthTestDistance:Number.POSITIVE_INFINITY,scaleByDistance:new Cesium.NearFarScalar(500000,1.8,25000000,.45)},
      label:isISS?{text:'ISS',font:'11px monospace',fillColor:Cesium.Color.fromCssColorString('#34d399'),outlineColor:Cesium.Color.BLACK,outlineWidth:2,style:Cesium.LabelStyle.FILL_AND_OUTLINE,pixelOffset:new Cesium.Cartesian2(0,-22),disableDepthTestDistance:Number.POSITIVE_INFINITY,scaleByDistance:new Cesium.NearFarScalar(500000,1.1,20000000,.3)}:undefined,
      properties:{key,name:item.name,satrec},
    });
    let orbitEntity=null;
    if(!isSL){
      const pts=buildOrbit(satrec,cfg.orbitH);
      if(pts.length>2) orbitEntity=viewer.entities.add({polyline:{positions:pts,width:isISS?1.5:.7,material:new Cesium.PolylineGlowMaterialProperty({glowPower:isISS?.5:.18,color:color.withAlpha(isISS?.62:.22)})}});
    }
    sats.push({name:item.name,satrec,entity,orbitEntity,key});
  });
  allSats[key]=sats;
  const n=sats.length;
  document.getElementById('cnt-'+key).textContent=n+' 颗在轨';
  document.getElementById('n-'+key).textContent=n;
}

setInterval(()=>{
  Object.values(allSats).forEach(sats=>sats.forEach(sat=>{
    if(!sat.entity.show) return;
    const r=getPos(sat.satrec);
    if(r) sat.entity.position=new Cesium.ConstantPositionProperty(Cesium.Cartesian3.fromDegrees(r.lon,r.lat,r.alt));
  }));
  if(tracked) updateCard(tracked);
},1000);

function toggle(key){
  vis[key]=!vis[key];
  document.getElementById('cb-'+key).classList.toggle('off',!vis[key]);
  (allSats[key]||[]).forEach(s=>{s.entity.show=vis[key];if(s.orbitEntity)s.orbitEntity.show=vis[key];});
}

viewer.screenSpaceEventHandler.setInputAction(click=>{
  const p=viewer.scene.pick(click.position);
  if(!Cesium.defined(p&&p.id)) return;
  const props=p.id.properties;if(!props||!props.key) return;
  const sat={key:props.key.getValue(),name:props.name.getValue(),satrec:props.satrec.getValue()};
  tracked=sat;
  const colors={starlink:'#a78bfa',gps:'#60a5fa',beidou:'#fb923c',iss:'#34d399'};
  const card=document.getElementById('sat-card');
  card.style.display='block';card.style.borderTopColor=colors[sat.key]||'#60a8ff';
  document.getElementById('hint').style.display='none';
  updateCard(sat);
},Cesium.ScreenSpaceEventType.LEFT_CLICK);

function updateCard(sat){
  const now=new Date(),pv=satellite.propagate(sat.satrec,now);
  if(!pv||!pv.position) return;
  const gmst=satellite.gstime(now),geo=satellite.eciToGeodetic(pv.position,gmst);
  const lon=satellite.degreesLong(geo.longitude).toFixed(2),lat=satellite.degreesLat(geo.latitude).toFixed(2),altKm=geo.height.toFixed(0);
  let vel='—';if(pv.velocity){const v=pv.velocity;vel=Math.sqrt(v.x*v.x+v.y*v.y+v.z*v.z).toFixed(2);}
  const inc=sat.satrec.inclo?(sat.satrec.inclo*180/Math.PI).toFixed(1):'—';
  const per=sat.satrec.no?(2*Math.PI/sat.satrec.no).toFixed(1):'—';
  const covPct=Math.min(99,Math.round((1-Math.cos(Math.acos(Math.min(1,6371/(6371+geo.height)))*Math.PI/180))/2*100));
  document.getElementById('sname').textContent=sat.name;
  document.getElementById('stype').textContent=CFG[sat.key]&&CFG[sat.key].type||sat.key;
  document.getElementById('salt').textContent=altKm;
  document.getElementById('svel').textContent=vel;
  document.getElementById('sinc').textContent=inc;
  document.getElementById('sper').textContent=per;
  document.getElementById('spos').textContent='经度 '+lon+'°  ·  纬度 '+lat+'°';
  document.getElementById('covfill').style.width=covPct+'%';
  document.getElementById('covpct').textContent=covPct+'%';
}

function closeCard(){document.getElementById('sat-card').style.display='none';document.getElementById('hint').style.display='block';tracked=null;}

function toggleMeteor(){
  meteorOn=!meteorOn;
  document.getElementById('mbtn').classList.toggle('on',meteorOn);
  if(meteorOn) scheduleMeteors();
  else{meteors.forEach(e=>viewer.entities.remove(e));meteors=[];}
}

function scheduleMeteors(){
  if(!meteorOn) return;
  for(let i=0;i<10;i++) setTimeout(()=>{if(meteorOn)spawnOne();},i*200);
  setTimeout(scheduleMeteors,2600);
}

function spawnOne(){
  const lon=(Math.random()-.5)*360,lat=(Math.random()-.5)*130;
  const sH=(350+Math.random()*650)*1000,eH=65000;
  const eLon=lon+(Math.random()-.5)*12,eLat=lat+(Math.random()-.5)*12;
  const dur=1.2+Math.random()*2.5;
  const sp=new Cesium.SampledPositionProperty();
  const t0=Cesium.JulianDate.now(),t1=Cesium.JulianDate.addSeconds(t0,dur,new Cesium.JulianDate());
  sp.addSample(t0,Cesium.Cartesian3.fromDegrees(lon,lat,sH));
  sp.addSample(t1,Cesium.Cartesian3.fromDegrees(eLon,eLat,eH));
  const pal=['#ffffff','#d4b0ff','#90c8ff','#ffd090','#b0ffee'];
  const mc=Cesium.Color.fromCssColorString(pal[Math.floor(Math.random()*pal.length)]);
  const e=viewer.entities.add({
    position:sp,
    availability:new Cesium.TimeIntervalCollection([new Cesium.TimeInterval({start:t0,stop:t1})]),
    point:{pixelSize:4+Math.random()*8,color:mc.withAlpha(.95),disableDepthTestDistance:Number.POSITIVE_INFINITY},
    path:{resolution:1,material:new Cesium.PolylineGlowMaterialProperty({glowPower:.6,color:mc.withAlpha(.75)}),width:2+Math.random()*4,leadTime:0,trailTime:dur},
  });
  meteors.push(e);
  setTimeout(()=>{viewer.entities.remove(e);const i=meteors.indexOf(e);if(i>-1)meteors.splice(i,1);},dur*1000+700);
}

async function main(){
  setStatus('初始化 Cesium 地球...',5);
  await new Promise(res=>{
    const u=viewer.scene.globe.tileLoadProgressEvent.addEventListener(q=>{if(q===0){u();res();}});
    setTimeout(res,5000);
  });
  const steps=[{key:'iss',p0:12,p1:28},{key:'gps',p0:28,p1:52},{key:'beidou',p0:52,p1:74},{key:'starlink',p0:74,p1:96}];
  for(const {key,p0,p1} of steps){
    setStatus('拉取 '+CFG[key].name+' 数据...',p0);
    const items=await loadTLE(key);
    setStatus('渲染 '+CFG[key].name+'（'+items.length+' 颗）...',p1-4);
    buildEntities(key,items);
    setStatus(CFG[key].name+' ✓',p1);
  }
  setStatus('全部加载完成 ✓',100);
  setTimeout(()=>document.getElementById('loading').classList.add('gone'),900);
}
main();
</script>
